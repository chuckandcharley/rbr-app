<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready Bag Rally</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=source-sans-3:400,600,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#004270;--blue:#00b0ff;--gold:#00b0ff;--bg:#002d50;
  --ff:'Source Sans 3','Arial Narrow',Arial,sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--ff);overflow:hidden;color:#fff;}

#layout{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100vw;height:100vh;position:relative;padding:64px;}

#rsf-logo{width:640px;max-width:70%;margin-bottom:64px;opacity:.95;display:block;}
#event-label{font-size:20px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:18px;}
#total-num{
  font-size:clamp(200px,22vw,420px);font-weight:900;letter-spacing:-.04em;
  color:#fff;line-height:1;font-variant-numeric:tabular-nums;text-align:center;
  transition:transform .12s cubic-bezier(0.34,1.6,0.64,1);
}
#total-num.bump{transform:scale(1.05);}
#total-goal{font-size:34px;font-weight:700;color:rgba(255,255,255,.4);margin-top:16px;}

#progress-wrap{width:100%;max-width:900px;margin-top:56px;}
#progress-track{height:18px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
#progress-fill{height:100%;background:var(--blue);border-radius:99px;width:0%;transition:width .6s cubic-bezier(0.4,0,0.2,1);}
#progress-pct{font-size:22px;font-weight:700;color:rgba(255,255,255,.4);margin-top:14px;letter-spacing:.06em;text-align:right;}

/* CELEBRATION */
#celebration{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  /* vignette: stays clear in the center where the number sits, darkens toward the edges */
  background:radial-gradient(circle at 50% 50%, rgba(0,21,40,0) 0%, rgba(0,21,40,0) 30%, rgba(0,21,40,.55) 65%, rgba(0,21,40,.88) 100%);
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;
}
#celebration.show{opacity:1;}
#celebration-num{font-size:clamp(200px,22vw,420px);font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 70px rgba(0,176,255,.6);}

#confetti-canvas{position:fixed;inset:0;z-index:60;pointer-events:none;}

/* CONNECTION */
#conn{position:fixed;bottom:14px;right:16px;width:8px;height:8px;border-radius:50%;background:#3a3;transition:background .3s;}
#conn.off{background:#a33;}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://advjuonmfxpjxxgmoycx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdmp1b25tZnhwanh4Z21veWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzkyMjQsImV4cCI6MjA5NTU1NTIyNH0.hgAlqocR8DSTHNGg_fdG6nWW6NQ6t_K2RD7D4sdXPGc';
const GOAL = 16000;
let counts = new Array(40).fill(0);
let lastTotal = 0;
let celebrationFired = false;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function loadAll() {
  const { data, error } = await sb.from('lines').select('id, count').order('id');
  if (error) { console.error(error); return; }
  data.forEach(row => { counts[row.id - 1] = row.count; });
  applyState();
}

const conn = document.getElementById('conn');
sb.channel('lines-changes')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'lines' },
    (payload) => {
      counts[payload.new.id - 1] = payload.new.count;
      applyState();
    }
  )
  .subscribe((status) => {
    conn.classList.toggle('off', status !== 'SUBSCRIBED');
  });

function applyState() {
  const rawTotal = counts.reduce((a, b) => a + b, 0);
  const total = Math.min(rawTotal, GOAL); // never display past the goal

  if (total !== lastTotal) {
    const el = document.getElementById('total-num');
    el.textContent = total.toLocaleString();
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 220);
  }

  const pct = Math.min(100, (total / GOAL) * 100);
  document.getElementById('progress-fill').style.width = pct.toFixed(2) + '%';
  document.getElementById('progress-pct').textContent = pct.toFixed(1) + '%';

  if (total >= GOAL && !celebrationFired) {
    celebrationFired = true;
    triggerCelebration();
  } else if (total < GOAL && celebrationFired) {
    // counts were reset — clear the celebration so it can fire again later
    celebrationFired = false;
    document.getElementById('celebration').classList.remove('show');
    stopConfetti();
  }

  lastTotal = total;
}

function triggerCelebration() {
  document.getElementById('celebration').classList.add('show');
  startConfetti();
}

let confettiRunning = false;
let confettiFrameId = null;
let confettiParticles = null;
let confettiCanvas = null;
let confettiCtx = null;

function makeParticle(canvas, randomizeY) {
  const COLORS = ['#00b0ff','#004270','#0378ad','#ffffff','#f3f9fd','#7fd4ff'];
  return {
    x: Math.random() * canvas.width,
    y: randomizeY ? Math.random() * canvas.height : -20 - Math.random() * canvas.height * 0.3,
    w: 6 + Math.random() * 8, h: 10 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.12,
    vx: (Math.random() - 0.5) * 2.5,
    vy: 2.5 + Math.random() * 3.5,
    opacity: 0.85 + Math.random() * 0.15,
  };
}

function startConfetti() {
  if (confettiRunning) return; // already going
  confettiCanvas = document.getElementById('confetti-canvas');
  confettiCtx = confettiCanvas.getContext('2d');
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  confettiParticles = Array.from({ length: 220 }, () => makeParticle(confettiCanvas, true));
  confettiRunning = true;

  function frame() {
    if (!confettiRunning) return;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    confettiParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      // recycle back to the top so it keeps falling indefinitely
      if (p.y > confettiCanvas.height + 20) {
        const fresh = makeParticle(confettiCanvas, false);
        Object.assign(p, fresh);
      }
      confettiCtx.save();
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.rot);
      confettiCtx.globalAlpha = p.opacity;
      confettiCtx.fillStyle = p.color;
      confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      confettiCtx.restore();
    });
    confettiFrameId = requestAnimationFrame(frame);
  }
  confettiFrameId = requestAnimationFrame(frame);
}

function stopConfetti() {
  confettiRunning = false;
  if (confettiFrameId) cancelAnimationFrame(confettiFrameId);
  if (confettiCtx && confettiCanvas) {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

loadAll();
</script>
