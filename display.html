<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready Bag Rally — Live Display</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=source-sans-3:400,600,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#004270;--blue:#0378ad;--gold:#f0a500;--bg:#002d50;
  --ff:'Source Sans 3','Arial Narrow',Arial,sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--ff);overflow:hidden;color:#fff;}

#layout{display:grid;grid-template-columns:1fr 420px;height:100vh;}

/* ── LEFT ── */
#left{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px;border-right:1px solid rgba(255,255,255,.08);position:relative;
}
#rsf-logo{width:72px;margin-bottom:28px;opacity:.9;}
#event-label{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px;}
#total-num{
  font-size:clamp(80px,11vw,160px);font-weight:900;letter-spacing:-.04em;
  color:#fff;line-height:1;font-variant-numeric:tabular-nums;text-align:center;
  transition:transform .12s cubic-bezier(0.34,1.6,0.64,1);
}
#total-num.bump{transform:scale(1.06);}
#total-goal{font-size:18px;font-weight:700;color:rgba(255,255,255,.35);margin-top:8px;}

#progress-wrap{width:100%;max-width:480px;margin-top:36px;}
#progress-track{height:10px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
#progress-fill{height:100%;background:var(--gold);border-radius:99px;width:0%;transition:width .6s cubic-bezier(0.4,0,0.2,1);}
#progress-pct{font-size:12px;font-weight:700;color:rgba(255,255,255,.35);margin-top:8px;letter-spacing:.06em;text-align:right;}

#milestone-banner{
  position:absolute;bottom:40px;left:48px;right:48px;
  background:var(--gold);border-radius:12px;padding:14px 24px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(16px);
  transition:opacity .4s ease,transform .4s cubic-bezier(0.34,1.4,0.64,1);
}
#milestone-banner.show{opacity:1;transform:translateY(0);}
#milestone-text{font-size:18px;font-weight:900;color:var(--navy);}

/* ── RIGHT ── */
#right{display:flex;flex-direction:column;padding:32px 28px;overflow:hidden;}
#board-title{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:20px;}
#board-list{flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden;}

.board-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;
  background:rgba(255,255,255,.04);
  flex-shrink:0;
}
.board-row.top1{background:rgba(240,165,0,.14);border:1px solid rgba(240,165,0,.25);}
.board-row.top2{background:rgba(255,255,255,.08);}
.board-row.top3{background:rgba(255,255,255,.06);}
.board-rank{width:26px;font-size:12px;font-weight:700;color:rgba(255,255,255,.3);text-align:center;flex-shrink:0;}
.board-rank.gold{color:var(--gold);}
.board-line{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);flex:1;}
.board-bar-wrap{width:90px;height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;flex-shrink:0;}
.board-bar{height:100%;border-radius:99px;background:var(--blue);transition:width .5s ease;}
.board-count{width:44px;text-align:right;font-size:13px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;flex-shrink:0;}

/* ── CELEBRATION ── */
#celebration{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,21,40,.92);
  opacity:0;pointer-events:none;
  transition:opacity .8s ease;
}
#celebration.show{opacity:1;}
#celebration-num{font-size:clamp(100px,18vw,240px);font-weight:900;color:var(--gold);letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
#celebration-text{font-size:clamp(22px,3.5vw,52px);font-weight:900;color:#fff;margin-top:8px;text-align:center;}
#celebration-sub{font-size:16px;font-weight:600;color:rgba(255,255,255,.45);margin-top:12px;letter-spacing:.06em;text-transform:uppercase;}

#confetti-canvas{position:fixed;inset:0;z-index:60;pointer-events:none;}

/* ── CONNECTION ── */
#conn{position:fixed;bottom:14px;right:16px;width:8px;height:8px;border-radius:50%;background:#3a3;transition:background .3s;}
#conn.off{background:#a33;}
</style>
</head>
<body>

    <div id="event-label">Ready Bag Rally · September 18, 2026</div>
    <div id="total-num">0</div>
    <div id="total-goal">of 16,000 bags</div>
    <div id="progress-wrap">
      <div id="progress-track"><div id="progress-fill"></div></div>

    </div>

  </div>

  <div id="right">
    <div id="board-title">Line leaderboard</div>

  </div>
</div>

<div id="celebration">
  <div id="celebration-num">16,000</div>
  <div id="celebration-text">Every family gets a Ready Bag.</div>
  <div id="celebration-sub">Mission accomplished · September 18, 2026</div>
</div>

<div id="conn"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://advjuonmfxpjxxgmoycx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdmp1b25tZnhwanh4Z21veWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzkyMjQsImV4cCI6MjA5NTU1NTIyNH0.hgAlqocR8DSTHNGg_fdG6nWW6NQ6t_K2RD7D4sdXPGc';
const GOAL = 16000;
const MILESTONES = [
  { at: 4000,  msg: '🎉 4,000 bags packed — one quarter of the way!' },
  { at: 8000,  msg: '🔥 Halfway there — 8,000 bags!' },
  { at: 12000, msg: '⚡ 12,000 bags — three quarters done!' },
];
const shownMilestones = new Set();
let counts = new Array(40).fill(0);
let lastTotal = 0;
let celebrationFired = false;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Initial load ──────────────────────────────────────────────
async function loadAll() {
  const { data, error } = await sb.from('lines').select('id, count').order('id');
  if (error) { console.error(error); return; }
  data.forEach(row => { counts[row.id - 1] = row.count; });
  applyState();
}

// ── Realtime subscription ─────────────────────────────────────
const conn = document.getElementById('conn');
sb.channel('lines-changes')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'lines' },
    (payload) => {
      counts[payload.new.id - 1] = payload.new.count;
      applyState();
    }
  )
  .subscribe((status) => {
    conn.classList.toggle('off', status !== 'SUBSCRIBED');
  });

// ── Render ────────────────────────────────────────────────────
function applyState() {
  const total = counts.reduce((a, b) => a + b, 0);

  if (total !== lastTotal) {
    const el = document.getElementById('total-num');
    el.textContent = total.toLocaleString();
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 220);
  }

  const pct = Math.min(100, (total / GOAL) * 100);
  document.getElementById('progress-fill').style.width = pct.toFixed(2) + '%';
  document.getElementById('progress-pct').textContent = pct.toFixed(1) + '%';

  renderBoard();

  for (const m of MILESTONES) {
    if (total >= m.at && !shownMilestones.has(m.at)) {
      shownMilestones.add(m.at);
      showMilestone(m.msg);
    }
  }

  if (total >= GOAL && !celebrationFired) {
    celebrationFired = true;
    triggerCelebration();
  }

  lastTotal = total;
}

function renderBoard() {
  const list = document.getElementById('board-list');
  const indexed = counts
    .map((c, i) => ({ line: i + 1, count: c }))
    .filter(x => x.count > 0)
    .sort((a, b) => b.count - a.count)
    .slice(0, 20);

  const maxCount = indexed.length ? indexed[0].count : 1;
  list.innerHTML = '';

  if (!indexed.length) {
    list.innerHTML = '<div style="color:rgba(255,255,255,.2);font-size:13px;font-weight:600;padding:20px;text-align:center;letter-spacing:.06em;text-transform:uppercase;">Waiting for bags…</div>';
    return;
  }

  indexed.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'board-row' + (i === 0 ? ' top1' : i === 1 ? ' top2' : i === 2 ? ' top3' : '');
    const rankEmoji = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
    const rankClass = i === 0 ? ' gold' : '';
    const barPct = Math.round((item.count / maxCount) * 100);
    row.innerHTML = `
      <div class="board-rank${rankClass}">${rankEmoji}</div>
      <div class="board-line">Line ${item.line}</div>
      <div class="board-bar-wrap"><div class="board-bar" style="width:${barPct}%"></div></div>
      <div class="board-count">${item.count.toLocaleString()}</div>
    `;
    list.appendChild(row);
  });
}

function showMilestone(msg) {
  const banner = document.getElementById('milestone-banner');
  document.getElementById('milestone-text').textContent = msg;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 5000);
}

function triggerCelebration() {
  document.getElementById('celebration').classList.add('show');
  startConfetti();
}

// ── Confetti ──────────────────────────────────────────────────
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const COLORS = ['#f0a500','#004270','#0378ad','#ffffff','#f3f9fd','#ffd166'];
  const particles = Array.from({ length: 220 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: 6 + Math.random() * 8, h: 10 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.12,
    vx: (Math.random() - 0.5) * 2.5,
    vy: 2.5 + Math.random() * 3.5,
    opacity: 0.85 + Math.random() * 0.15,
  }));
  let running = true;
  function frame() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let allGone = true;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      if (p.y < canvas.height + 20) allGone = false;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (allGone) { running = false; return; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

loadAll();
</script>
