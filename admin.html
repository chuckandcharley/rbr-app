<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RBR Admin</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=source-sans-3:400,600,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#004270;--blue:#0378ad;--bg:#f3f9fd;--ff:'Source Sans 3','Arial Narrow',Arial,sans-serif;}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:var(--ff);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;}

#card{background:#fff;border-radius:16px;border:1.5px solid #cde4f0;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,42,70,.08);}
#logo{width:40px;margin-bottom:20px;display:block;}
h1{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:4px;letter-spacing:-.01em;}
.sub{font-size:13px;color:#6a8caa;margin-bottom:24px;line-height:1.5;}

label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:6px;}
input[type=password]{
  width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #cde4f0;
  font-size:15px;font-family:var(--ff);color:var(--navy);background:#f3f9fd;
  outline:none;margin-bottom:8px;transition:border-color .15s;
}
input[type=password]:focus{border-color:var(--blue);}
#error-msg{font-size:12px;color:#c0392b;margin-bottom:12px;display:none;font-weight:600;}
#btn-unlock{
  width:100%;padding:11px;border-radius:8px;background:var(--navy);color:#fff;
  border:none;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;font-family:var(--ff);transition:background .15s;margin-bottom:0;
}
#btn-unlock:hover{background:#003258;}
#btn-unlock:active{transform:scale(.98);}

#divider{border:none;border-top:1.5px solid #e0edf5;margin:28px 0;}

/* State summary */
#state-summary{background:#f3f9fd;border-radius:10px;padding:16px 18px;margin-bottom:20px;}
#state-total{font-size:32px;font-weight:900;color:var(--navy);font-variant-numeric:tabular-nums;line-height:1;}
#state-of{font-size:13px;font-weight:600;color:#6a8caa;margin-top:2px;margin-bottom:14px;}
#state-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.line-cell{
  border-radius:6px;padding:5px 4px;text-align:center;
  font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;
  background:#e8f3fb;color:var(--navy);line-height:1.3;
}
.line-cell.has-count{background:var(--navy);color:#fff;}
.line-cell .ln{font-size:8px;opacity:.6;display:block;}
.line-cell .ct{display:block;}

/* Buttons */
#btn-reset{
  width:100%;padding:11px;border-radius:8px;background:#c0392b;color:#fff;
  border:none;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;font-family:var(--ff);transition:background .15s,opacity .2s;
}
#btn-reset:hover{background:#a93226;}
#btn-reset:active{transform:scale(.98);}
#btn-reset:disabled{opacity:.4;cursor:not-allowed;}

#reset-status{font-size:12px;font-weight:700;margin-top:10px;text-align:center;min-height:18px;}
#reset-status.ok{color:#1a7a4a;}
#reset-status.err{color:#c0392b;}

#btn-refresh{
  width:100%;padding:9px;border-radius:8px;background:transparent;color:var(--blue);
  border:1.5px solid #cde4f0;font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;font-family:var(--ff);margin-top:10px;
  transition:background .12s;
}
#btn-refresh:hover{background:#f0f7fc;}

#admin-panel{display:none;}
</style>
</head>
<body>

  <!-- Auth gate -->
  <div id="auth-panel">
    <h1>RBR Admin</h1>
    <p class="sub">Enter the passphrase to access reset controls.</p>
    <label for="pass-input">Passphrase</label>
    <input type="password" id="pass-input" placeholder="••••••••" autocomplete="off">
    <div id="error-msg">Wrong passphrase — try again.</div>
    <button id="btn-unlock">Unlock</button>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <hr id="divider">
    <div id="state-summary">
      <div id="state-total">—</div>
      <div id="state-of">bags packed across all lines</div>
      <div id="state-grid"></div>
    </div>
    <button id="btn-reset">Reset all counts to zero</button>
    <div id="reset-status"></div>
    <button id="btn-refresh">↺ Refresh</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://advjuonmfxpjxxgmoycx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdmp1b25tZnhwanh4Z21veWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzkyMjQsImV4cCI6MjA5NTU1NTIyNH0.hgAlqocR8DSTHNGg_fdG6nWW6NQ6t_K2RD7D4sdXPGc';
const PASSPHRASE = 'Redleaf1';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Auth ──────────────────────────────────────────────────────
document.getElementById('btn-unlock').addEventListener('click', tryUnlock);
document.getElementById('pass-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

function tryUnlock() {
  const val = document.getElementById('pass-input').value;
  if (val !== PASSPHRASE) {
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('auth-panel').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadState();
}

// ── Load state ────────────────────────────────────────────────
async function loadState() {
  const { data, error } = await sb.from('lines').select('id, count').order('id');
  if (error) { console.error(error); return; }

  const total = data.reduce((a, r) => a + r.count, 0);
  document.getElementById('state-total').textContent = total.toLocaleString();

  const grid = document.getElementById('state-grid');
  grid.innerHTML = '';
  data.forEach(row => {
    const cell = document.createElement('div');
    cell.className = 'line-cell' + (row.count > 0 ? ' has-count' : '');
    cell.innerHTML = `<span class="ln">${row.id}</span><span class="ct">${row.count}</span>`;
    grid.appendChild(cell);
  });
}

// ── Reset ─────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', async () => {
  const btn = document.getElementById('btn-reset');
  const status = document.getElementById('reset-status');

  if (!confirm('Reset ALL 40 line counts to zero? This cannot be undone.')) return;

  btn.disabled = true;
  status.className = '';
  status.textContent = 'Resetting…';

  const { error } = await sb.from('lines').update({ count: 0 }).gte('id', 1);

  if (error) {
    status.className = 'err';
    status.textContent = 'Error — ' + error.message;
  } else {
    status.className = 'ok';
    status.textContent = '✓ All counts reset to zero.';
    loadState();
  }

  btn.disabled = false;
});

document.getElementById('btn-refresh').addEventListener('click', loadState);
</script>
