 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ready Bag Rally</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#002d50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Explicit icon links for Fire tablet browsers -->
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="shortcut icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=source-sans-3:400,600,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#004270;--blue:#00b0ff;--bg:#002d50;--white:#fff;
  --ff:'Source Sans 3','Arial Narrow',Arial,sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--ff);overflow:hidden;touch-action:manipulation;color:#fff;
  -webkit-user-select:none;user-select:none;overscroll-behavior:none;}

.screen{position:fixed;inset:0;display:flex;transition:opacity .3s ease;}
.screen.hidden{opacity:0;pointer-events:none;visibility:hidden;}

/* ── SELECT SCREEN ── */
#screen-select{background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:4vh 6vw;}
#select-logo{width:8vh;min-width:44px;margin-bottom:2.4vh;}
#select-title{font-size:clamp(24px,4.6vh,42px);font-weight:900;color:#fff;letter-spacing:-.02em;text-align:center;line-height:1.1;margin-bottom:.6vh;}
#select-sub{font-size:clamp(12px,1.8vh,16px);font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:3.2vh;}
#line-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:1.4vh;width:100%;max-width:840px;}
.line-btn{
  aspect-ratio:1;border-radius:14px;border:1.5px solid rgba(0,176,255,.35);
  background:rgba(255,255,255,.05);
  font-size:clamp(20px,3.4vh,30px);font-weight:900;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s,transform .1s,box-shadow .12s;
  -webkit-tap-highlight-color:transparent;
}
.line-btn:active{transform:scale(.92);background:var(--blue);border-color:var(--blue);color:var(--navy);box-shadow:0 0 0 4px rgba(0,176,255,.2);}

/* ════════════════════════════════════════════════════════════
   TAP SCREEN — LANDSCAPE (primary layout for Fire 7)
   Two-column: big button on left, count on right
   ════════════════════════════════════════════════════════════ */
#screen-tap{background:var(--navy);flex-direction:row;align-items:stretch;}

/* ── Left column: button + hint side by side ── */
#tap-left{
  flex:1 1 50%;display:flex;flex-direction:row;align-items:center;justify-content:center;
  position:relative;gap:4vw;padding:2vh 2vw 2vh 4vw;
}
#tap-btn{
  /* Big circle — uses vh for both axes so it's always round regardless of window shape */
  width:min(78vh,46vw);height:min(78vh,46vw);
  max-width:calc(50vw - 48px);max-height:calc(100vh - 80px);
  border-radius:50%;background:var(--blue);border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4vh;
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s,background .12s;
  position:relative;overflow:hidden;
  box-shadow:0 0 0 10px rgba(0,176,255,.18),0 0 0 22px rgba(0,176,255,.08);
}
#tap-btn:active{transform:scale(.94);}
#tap-btn.flash{background:#33c6ff;}
#tap-btn-icon{width:46%;height:46%;object-fit:contain;pointer-events:none;user-select:none;margin-top:.8vh;}
#tap-btn-label{font-size:clamp(12px,2vh,18px);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,66,112,.85);pointer-events:none;margin-bottom:.6vh;}

/* Arrow + helper text to the RIGHT of the button, vertically centered */
#tap-hint{
  display:flex;flex-direction:column;align-items:center;gap:.6vh;
  pointer-events:none;
  animation:hint-pulse 2.4s ease-in-out infinite;
}
#tap-hint-arrow{
  font-size:clamp(44px,10vh,80px);line-height:1;color:var(--blue);
}
#tap-hint-text{
  font-size:clamp(15px,2.8vh,24px);font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(0,176,255,.65);white-space:nowrap;
}
@keyframes hint-pulse{
  0%,100%{opacity:.5;transform:translateX(0);}
  50%{opacity:1;transform:translateX(-4px);}
}

.ripple{
  position:absolute;border-radius:50%;background:rgba(255,255,255,.25);
  transform:scale(0);animation:ripple-out .5s ease forwards;pointer-events:none;
}
@keyframes ripple-out{to{transform:scale(2.5);opacity:0;}}

/* ── Right column: line info + count ── */
#tap-right{
  flex:1 1 50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:3vh 4vw;position:relative;
}

/* Line label + change button header strip */
#tap-header{
  position:absolute;top:3vh;left:0;right:0;padding:0 4vw;
  display:flex;align-items:center;justify-content:center;
}
#tap-line-block{text-align:center;}
#tap-line-label{font-size:clamp(9px,1.4vh,12px);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);}
#tap-line-num{font-size:clamp(22px,4vh,38px);font-weight:900;color:#fff;line-height:1.05;margin-top:.3vh;}
#change-line{position:absolute;top:0;right:4vw;background:none;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;padding:1vh 2vw;font-size:clamp(8px,1.2vh,10px);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);cursor:pointer;font-family:var(--ff);-webkit-tap-highlight-color:transparent;white-space:nowrap;}
#change-line:active{background:rgba(255,255,255,.08);}

/* Count — the star of the right panel, must always fit */
#tap-count-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  width:100%;max-width:100%;overflow:hidden;padding:0 2vw;
}
#tap-count{
  font-size:clamp(60px,22vh,200px);
  font-weight:900;color:var(--white);letter-spacing:-.04em;
  line-height:.9;font-variant-numeric:tabular-nums;
  max-width:100%;overflow:hidden;
}
#tap-count-label{font-size:clamp(13px,2.2vh,20px);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:1.2vh;}

#tap-locked-msg{font-size:clamp(14px,2.2vh,20px);font-weight:700;color:var(--blue);display:none;margin-top:1.6vh;text-align:center;}

#conn-dot{position:absolute;top:3.4vh;right:calc(4vw - 14px);width:7px;height:7px;border-radius:50%;background:#3a3;transition:background .3s;}
#conn-dot.off{background:#a33;}


</style>
</head>
<body>

<!-- SELECT LINE -->

  <div id="select-title">Ready Bag Rally</div>
  <div id="select-sub">Select your line</div>
  <div id="line-grid"></div>
</div>

<!-- TAP SCREEN -->
<div class="screen hidden" id="screen-tap">
  <div id="tap-left">
    <button id="tap-btn" aria-label="Tap for each bag packed">
      <img id="tap-btn-icon" src="RBRbag.png" alt="Ready Bag" draggable="false">
      <div id="tap-btn-label">Tap per bag</div>
    </button>
    <!-- Arrow + helper text to the right of button, pointing left at it -->
    <div id="tap-hint">
      <div id="tap-hint-arrow">&#x2190;</div>
      <div id="tap-hint-text">Press here</div>
    </div>
  </div>

  <div id="tap-right">
    <div id="conn-dot"></div>
    <div id="tap-header">
      <div id="tap-line-block">
        <div id="tap-line-label">You are on</div>
        <div id="tap-line-num">Line —</div>
      </div>
      <button id="change-line">Change line</button>
    </div>

    <div id="tap-count-wrap">
      <div id="tap-count">0</div>
      <div id="tap-count-label">bags from your line</div>
      <div id="tap-locked-msg">16k Bags Completed! Thank you for being a part of it!</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://advjuonmfxpjxxgmoycx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdmp1b25tZnhwanh4Z21veWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzkyMjQsImV4cCI6MjA5NTU1NTIyNH0.hgAlqocR8DSTHNGg_fdG6nWW6NQ6t_K2RD7D4sdXPGc';
const GOAL = 16000;
const LINES = 16;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let selectedLine = null;
let lineCount = 0;
let locked = false;
let tapping = false;

// ── Build line grid ──
const grid = document.getElementById('line-grid');
for (let i = 1; i <= LINES; i++) {
  const btn = document.createElement('button');
  btn.className = 'line-btn';
  btn.textContent = i;
  btn.addEventListener('click', () => selectLine(i));
  grid.appendChild(btn);
}

async function selectLine(n) {
  selectedLine = n;
  document.getElementById('tap-line-num').textContent = `Line ${n}`;
  document.getElementById('screen-select').classList.add('hidden');
  document.getElementById('screen-tap').classList.remove('hidden');
  await refreshLineCount();
}

document.getElementById('change-line').addEventListener('click', () => {
  document.getElementById('screen-tap').classList.add('hidden');
  document.getElementById('screen-select').classList.remove('hidden');
});

const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
  const now = _audioCtx.currentTime;
  const osc = _audioCtx.createOscillator();
  const gain = _audioCtx.createGain();
  osc.connect(gain);
  gain.connect(_audioCtx.destination);
  osc.frequency.setValueAtTime(1200, now);
  osc.frequency.exponentialRampToValueAtTime(600, now + 0.02);
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
  osc.start(now);
  osc.stop(now + 0.03);
}

// ── Auto-fitting count display ──
// Shrinks the font until the number fits its container width.
const countEl = document.getElementById('tap-count');
const countWrap = document.getElementById('tap-count-wrap');

function updateCount(val) {
  countEl.textContent = val.toLocaleString();
  // Reset to CSS default size then shrink if needed
  countEl.style.fontSize = '';
  requestAnimationFrame(() => {
    const maxW = countWrap.clientWidth;
    let size = parseFloat(getComputedStyle(countEl).fontSize);
    // Shrink in steps until it fits (with a floor so it never vanishes)
    while (countEl.scrollWidth > maxW && size > 40) {
      size -= 4;
      countEl.style.fontSize = size + 'px';
    }
  });
}

// ── Tap ──
const tapBtn = document.getElementById('tap-btn');

tapBtn.addEventListener('pointerdown', async (e) => {
  if (locked || tapping) return;
  tapping = true;

  // Ripple
  const rect = tapBtn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
  tapBtn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 520);

  // Flash + haptic + tick
  tapBtn.classList.add('flash');
  setTimeout(() => tapBtn.classList.remove('flash'), 180);
  if (navigator.vibrate) navigator.vibrate(60);
  playTick();

  // Optimistic UI
  lineCount++;
  updateCount(lineCount);

  try {
    const { data, error } = await sb.rpc('increment_line', { line_id: selectedLine });
    if (error) throw error;
    lineCount = data.new_count;
    updateCount(lineCount);
    if (data.total >= GOAL) setLocked(true);
  } catch (err) {
    console.error(err);
  }

  tapping = false;
});

// ── State ──
async function refreshLineCount() {
  if (!selectedLine) return;
  try {
    const { data, error } = await sb
      .from('lines')
      .select('count')
      .eq('id', selectedLine)
      .single();
    if (error) throw error;
    lineCount = data.count;
    updateCount(lineCount);
  } catch (err) {
    console.error(err);
  }
}

// Check total to handle lock/unlock after resets
async function refreshTotal() {
  try {
    const { data, error } = await sb.from('lines').select('count');
    if (error) throw error;
    const total = data.reduce((sum, row) => sum + row.count, 0);
    if (total >= GOAL) {
      setLocked(true);
    } else if (locked && total < GOAL) {
      setLocked(false);
    }
  } catch (err) {
    console.error(err);
  }
}

function setLocked(val) {
  locked = val;
  tapBtn.style.opacity = val ? '0.4' : '1';
  tapBtn.style.pointerEvents = val ? 'none' : 'all';
  document.getElementById('tap-locked-msg').style.display = val ? 'block' : 'none';
  document.getElementById('tap-hint').style.display = val ? 'none' : 'flex';
}

// ── REALTIME: listen for changes to the lines table ──
// Key fix: the original code only had a conn-check channel with no
// postgres_changes listener, so tablets never heard about resets or
// other tablets' taps. Now they do.
const connDot = document.getElementById('conn-dot');

sb.channel('tablet-lines')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'lines' },
    (payload) => {
      if (payload.new.id === selectedLine) {
        lineCount = payload.new.count;
        updateCount(lineCount);
      }
    }
  )
  .subscribe((status) => {
    connDot.classList.toggle('off', status !== 'SUBSCRIBED');
  });

// ── Fire tablet: refresh on visibility change ──
// Fire OS aggressively suspends background tabs/apps. When the user
// comes back, re-fetch everything so it never shows stale data.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    refreshLineCount();
    refreshTotal();
    requestWakeLock();
    if (_audioCtx.state === 'suspended') {
      _audioCtx.resume().catch(() => {});
    }
  }
});

// Fallback polling every 15s
setInterval(() => {
  if (selectedLine) {
    refreshLineCount();
    refreshTotal();
  }
}, 15000);

// ── PWA: register service worker + keep screen awake ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW reg failed', e));
  });
}

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) { /* ignore */ }
}
requestWakeLock();

// ── Force landscape via Screen Orientation API ──
// The manifest "orientation":"landscape" only works if the browser
// respects it at install time. This JS call forces it at runtime
// as a belt-and-suspenders fallback for Fire OS.
function lockLandscape() {
  const so = screen.orientation;
  if (so && so.lock) {
    so.lock('landscape').catch(() => {});
  }
}
lockLandscape();
// Re-lock after fullscreen changes (some browsers release the lock)
document.addEventListener('fullscreenchange', lockLandscape);
</script>
